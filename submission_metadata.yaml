ai_usage_summary: |
  Used Gemini and Claude for development, debugging, code quality checks,
  and formatting documentation. No candidate data was sent to any external LLMs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A rule-based candidate ranker scoring candidates on three main dimensions:
  1. Career Profile Relevance (up to 50 points: evaluating current and past titles, years of experience, service company penalties, job tenure stability, technical/research drift, and CV/Speech domain misfit).
  2. Skills Match (up to 20 points: evaluating Python, dense embeddings, vector search, evaluation metrics, and nice-to-haves, while penalizing OpenAI/LangChain-only keyword stuffing).
  3. Redrob Behavioral Signals (up to 10 points: recruiter response rates, GitHub activity, notice periods, and recent logins).
  
  Additionally, anomalous profiles (honeypots) are identified and filtered out based on logical mismatches between job durations, stated years of experience, and skill proficiency timelines. The entire ranking completes in under 10 seconds.

